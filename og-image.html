<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OG Image Template</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 1200px;
      height: 630px;
      background: #fbfaf8;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }
    .card {
      text-align: center;
      max-width: 800px;
    }
    .name {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 64px;
      font-weight: 600;
      color: #37352f;
      letter-spacing: -0.5px;
      margin-bottom: 16px;
    }
    .title {
      font-size: 24px;
      font-weight: 400;
      color: #6b6a67;
      margin-bottom: 32px;
    }
    .accent-bar {
      width: 60px;
      height: 4px;
      background: #e94560;
      border-radius: 2px;
      margin: 0 auto 32px;
    }
    .tags {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .tag {
      font-size: 14px;
      font-weight: 500;
      padding: 4px 12px;
      border-radius: 4px;
      background: #fce4e8;
      color: #c4324a;
    }
    .corner {
      position: absolute;
      bottom: 32px;
      right: 40px;
      font-size: 14px;
      color: #8a8985;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="name">Douglas Hill</div>
    <div class="title">IT Solutions Engineer & Cloud Architect</div>
    <div class="accent-bar"></div>
    <div class="tags">
      <span class="tag">AWS</span>
      <span class="tag">Azure</span>
      <span class="tag">Power Platform</span>
      <span class="tag">TOGAF</span>
    </div>
  </div>
  <div class="corner">douglashillres.llcdouglashill.com</div>
</body>
</html>
